services:
  user-service:
    build: 
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service-app
    ports:
      - "3001:3001"
    restart: always

  data-siswa-service:
    build: 
      context: ./data-siswa-service
      dockerfile: Dockerfile
    container_name: data-siswa-service-app
    ports:
      - "3002:3002"
    restart: always

  absensi-service:
    build: 
      context: ./absensi-service
      dockerfile: Dockerfile
    container_name: absensi-service-app
    ports:
      - "3003:3003"
    restart: always

  data-guru-service:
    build: 
      context: ./data-guru-service
      dockerfile: Dockerfile
    container_name: data-guru-service-app
    ports:
      - "3003:3000"
    restart: always
